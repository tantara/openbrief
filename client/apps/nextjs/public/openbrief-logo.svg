<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OpenBrief logo</title>
  <desc id="desc">Two overlapping rounded rectangles, one horizontal and one vertical.</desc>
  <defs>
    <filter id="tile-shadow" x="-16%" y="-16%" width="132%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="horizontal" x1="92" y1="180" x2="420" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="vertical" x1="180" y1="92" x2="332" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bef264"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="overlap" x1="180" y1="180" x2="332" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="108" fill="#ffffff" filter="url(#tile-shadow)"/>
  <g transform="translate(0 2) scale(0.84 0.84) translate(48 48)">
    <rect x="92" y="180" width="328" height="152" rx="44" fill="url(#horizontal)" filter="url(#shadow)"/>
    <rect x="180" y="92" width="152" height="328" rx="44" fill="url(#vertical)" filter="url(#shadow)"/>
    <path
      d="M180 224c0-24.301 19.699-44 44-44h108v108c0 24.301-19.699 44-44 44H180V224Z"
      fill="url(#overlap)"
      opacity="0.96"
    />
  </g>
</svg>
