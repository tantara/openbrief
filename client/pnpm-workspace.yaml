packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  '@ffmpeg-installer/darwin-arm64': true
  '@ffprobe-installer/darwin-arm64': true
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  bufferutil: true
  core-js-pure: true
  esbuild: true
  prisma: true
  sharp: true
  utf-8-validate: false
  workerd: true

catalog:
  "@better-auth/cli": 1.4.0-beta.9
  "@better-auth/expo": 1.4.0-beta.9
  "@eslint/js": ^9.38.0
  "@tailwindcss/postcss": ^4.1.16
  "@tailwindcss/vite": ^4.1.16
  "@tanstack/react-form": ^1.23.8
  "@tanstack/react-query": ^5.90.8
  "@trpc/client": ^11.7.1
  "@trpc/server": ^11.7.1
  "@trpc/tanstack-react-query": ^11.7.1
  "@types/node": ^22.18.12
  "@vitejs/plugin-react": 5.1.0
  better-auth: 1.4.0-beta.9
  eslint: ^9.38.0
  prettier: ^3.6.2
  tailwindcss: ^4.1.16
  typescript: ^5.9.3
  zod: ^4.1.12
  vite: 7.1.12

catalogs:
  react19:
    "@types/react": ~19.1.0
    "@types/react-dom": ~19.1.0
    react: 19.1.4
    react-dom: 19.1.4

linkWorkspacePackages: true

onlyBuiltDependencies:
  - "@ffmpeg-installer/ffmpeg"
  - "@ffmpeg-installer/darwin-arm64"
  - "@ffmpeg-installer/darwin-x64"
  - "@ffmpeg-installer/linux-arm"
  - "@ffmpeg-installer/linux-arm64"
  - "@ffmpeg-installer/linux-ia32"
  - "@ffmpeg-installer/linux-x64"
  - "@ffmpeg-installer/win32-ia32"
  - "@ffmpeg-installer/win32-x64"
  - "@ffprobe-installer/ffprobe"
  - "@ffprobe-installer/darwin-arm64"
  - "@ffprobe-installer/darwin-x64"
  - "@ffprobe-installer/linux-arm"
  - "@ffprobe-installer/linux-arm64"
  - "@ffprobe-installer/linux-ia32"
  - "@ffprobe-installer/linux-x64"
  - "@ffprobe-installer/win32-ia32"
  - "@ffprobe-installer/win32-x64"
  - "@tailwindcss/oxide"
  - esbuild

overrides:
  "@types/minimatch": 5.1.2
  lightningcss: 1.30.1
  vite: 7.1.12

publicHoistPattern:
  - "@ianvs/prettier-plugin-sort-imports"
  - prettier-plugin-tailwindcss
